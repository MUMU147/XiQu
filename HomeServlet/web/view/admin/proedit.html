<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改</title>
    <link rel="stylesheet" th:href="@{/view/admin/css/index.css}">
    <link rel="stylesheet" th:href="@{/view/admin/css/commom.css}">
    <link rel="stylesheet" th:href="@{/view/admin/css/add_pd_pe.css}">
</head>
<body>
<div class="header right">
    <a href="index.html">首页</a>
    <!-- <span>&gt;</span> -->
    <a href="index.html">
        <img src="view/images/slogo.png" alt="" class="left">
    </a>
    <p class="right">
        <span>欢迎进入后台系统，管理员</span>
        <img src="" alt="" class="right">
    </p>
</div>
<div class="List left">
    <div id="first">
        <button class="accordion"> 首页</button>
        <button class="accordion">用户管理</button>
        <button class="accordion">商品管理</button>
        <ul class="btn-content">
            <li><button>戏曲票</button>
            </li>
            <li><button>戏曲文创</button></li>
        </ul>
        <button class="accordion">新闻管理</button>
        <ul class="btn-content">
            <li><button>剧院新闻</button></li>
            <li><button>文创新闻</button></li>
            <li><button>政策新闻</button></li>
        </ul>
        <button class="accordion">订单管理</button>
        <ul class="btn-content">
            <li><button>戏票订单</button></li>
            <li><button>文创订单</button></li>
        </ul>
        <button class="accordion">统计中心</button>
        <a href="index.html>退出管理</a>
    </div>
</div>
<div class="content left">
    <div class="common">
        <form th:action="@{'/proupdate'}" method="post" id="pfrom">
            <input type="hidden" th:value="${product.pid}" name="pid">
            名称：<input type="text" th:value="${product.pname}" name="pname"><br>
            单价：<input type="text" th:value="${product.price}" name="price"><br>
            库存：<input type="text" th:value="${product.stock}" name="stock"><br>
            <input type="submit" value="修改">
        </form>
    </div>
</div>
</body>
<script th:src="@{/view/admin/js/index.js}"></script>
</html>
