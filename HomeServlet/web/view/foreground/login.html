/* 登录按钮 */
.button--itzel {
    font-size: large;
    font-weight:bold;
	border: none;
    border-radius: 27px;
	padding: 0px;
	overflow: hidden;
	width: 258px;
    height: 65px;
    position: absolute;
    /* margin: 0 auto;
    right: 0; */
    right: -260px;
    color: aliceblue;
    background-color:rgba(156, 10, 0, 0.888);
}

.button--itzel::before {
	content: '';
	position: absolute;
	top: 0;
	left: 105px;
	width: 50px;
	height: 65px;
	border-radius: inherit;
    -webkit-clip-path:polygon(53% 27%, 83% 51%, 53% 75%, 19% 75%, 52% 50%, 19% 27%);
    background-color: rgb(255, 210, 61);
    clip-path:polygon(53% 27%, 83% 51%, 53% 75%, 19% 75%, 52% 50%, 19% 27%);
    /* clip-path:polygon(0% 20%,60% 20%,60% 0%,100% 50%,60% 100%,60% 80%,0% 80%); */
	/* -webkit-clip-path: (0% 0%, 0% 100%, 35% 100%, 35% 60%, 65% 60%, 65% 100%, 100% 100%, 100% 0%);
	clip-path: url('../index.html#clipBox'); */
	transform: translate3d(0, 100%, 0) translate3d(0, 0, 0);
	transform-origin: 50% 100%;
}

.button--itzel.button--border-thin::before {
	border: 1px solid;
	transform: translate3d(0, 100%, 0) translate3d(0, -1px, 0);
}

.button--itzel.button--border-thick::before {
	border: 3px solid;
	transform: translate3d(0, 100%, 0) translate3d(0, -3px, 0);
}

.button--itzel::before, 
.button--itzel .button__icon {
	transition: transform 0.3s;
	transition-timing-function: cubic-bezier(0.75, 0, 0.125, 1);
}

.button--itzel .button__icon {
	position: absolute;
	top: 100%;
	left: 50%;
	padding: 20px;
	font-size: 20px;
	transform: translate3d(-50%, 0, 0);
}

.button--itzel > span {
	display: block;
	padding: 20px;
	transition: transform 0.3s, opacity 0.3s;
	transition-delay: 0.3s;
}

.button--itzel:hover::before {
	transform: translate3d(0, 0, 0);
}

.button--itzel:hover .button__icon {
	transition-delay: 0.1s;
	/* transform: translate3d(-50%, -100%, 0); */
}

.button--itzel:hover > span {
	opacity: 0;
	transform: translate3d(0, -50%, 0);
	transition-delay: 0s;
}

<!-- 这是侧边栏的js -->
<script>
    const showMenu = (toggleId, navbarId, bodyId) => {
      const toggle = document.getElementById(toggleId),
        navbar = document.getElementById(navbarId);
      bodypadding = document.getElementById(bodyId);

      if (toggle && navbar) {
        toggle.addEventListener('click', () => {
          navbar.classList.toggle('expander')
          bodypadding.classList.toggle('body-pd')
        })
      }
    }

    showMenu('nav-toggle', 'navbar', 'body-pd')


    const linkColor = document.querySelectorAll(".nav_link")
    function colorLink() {
      linkColor.forEach(l => l.classList.remove('active'))
      this.classList.add('active')
    }
    linkColor.forEach(l => l.addEventListener('click', colorLink))

    const linkCollapse = document.getElementsByClassName('collapse__link')
    var i

    for (i = 0; i < linkCollapse.length; i++) {
      linkCollapse[i].addEventListener('click', function () {
        const collapseMenu = this.nextElementSibling
        collapseMenu.classList.toggle('showCollapse')

        const rotate = collapseMenu.previousElementSibling
        rotate.classList.toggle("")
      })
    }
  </script>
<!-- 验证码js -->
<script>
    var _count = document.getElementById("count"); //获取验证码按钮
    var time = 59;
    // 注册单击事件
    _count.addEventListener('click', function() {
        // 禁用按钮
        _count.disabled = true;
        // 开启定时器
        var timer = setInterval(function() {
            // 判断剩余秒数
            if (time == 0) {
             // 清除定时器和复原按钮
                clearInterval(timer);
                _count.disabled = false;
                _count.innerHTML = '获取验证码';
            } else {
                _count.innerHTML = `重新获取(${time})`;
                time--;
            }
        }, 1000);
    });
    window.onload = function() {
        _count.addEventListener('click', function (){
            //     跳到servlet
            let email = document.querySelector("#user1").value;
            console.log(email);
            let xhr = new XMLHttpRequest();
            xhr.open('GET', '/HomeServlet/getvcode?email=' + email, true);
            xhr.send();
            alert("验证码已发送");
        });
    }
</script>
