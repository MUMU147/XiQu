<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/HomeServlet/view/foreground/css/222.css">
    <link rel="stylesheet" href="/HomeServlet/view/foreground/css/show.css">
</head>
<body>
    <div class="header">
    <div class="shortcut">
        <h5 class="left">中国戏曲网站</h5>
        <div class="right">
            <a href="/HomeServlet/view/foreground/fapiao.html">账户</a>
            <a href=""> <img src="/HomeServlet/view/foreground/images/dan.jpg" alt=""></a>
            <a th:href="@{/forget}">退出登录</a>
            <a th:href="@{/mycollect}">收藏</a>
            <a href="">购物车</a>
        </div>
    </div>
    <div class="nav">
        <ul>
            <li><a href="http://localhost:8080/HomeServlet/sindex">首页</a></li>
            <li><a th:href="@{/pshow}">文创</a></li>
            <li><a href="">演出购票</a></li>
            <li><a href="">资讯动态</a></li>
            <li><a href="http://localhost:8080/HomeServlet/regemail">登录 | 注册</a></li>
            <li>
                <a href="">联系我们</a>
            </li>
        </ul>
        <img src="/HomeServlet/view/foreground/images/center.png" alt="">
    </div>
    </div>
    <div class="zhuti">
        <div class="search">
            <form th:action="@{'/psindex'}" method="post" style="margin: 0 auto">
                <input type="text" id="keyword" name="keyword" placeholder="请输入关键字"/>
                <input type="submit" value="查询" class="btn" name="search">
                <input type="submit" value="显示所有" class="btn" name="search" />
            </form>
        </div>
        <div class="box-hd">
            <h3>分类</h3>
            <ul>
                <li><a href="#"  >京剧娃娃</a></li>
                <li><a href="#" >家具</a></li>
                <li><a href="#" >文具</a></li>
                <li><a href="#" >生活用品</a></li>
            </ul>
        </div>
        <div class="box-bd2">
            <ul>
                <li th:each="product:${sproduct}" >
                    <img th:src="${product.img}" alt="">
                    <div class="title"><span th:text="${product.pname}">名称</span></div>
                    <div class="info">
                    单价：<span th:text="${product.price}">单价</span>
                        <br>
                        <br>
                    剩余数量： <span th:text="${product.price}">剩余数量</span>
                    </div>
                    <div class="last">
                        <a th:href="@{/addcollection(pid=${product.pid})}">加入收藏</a>
                    </div>

                </li>
            </ul>
            <p style="clear: both"></p>
        </div>
    </div>
</body>
</html>
