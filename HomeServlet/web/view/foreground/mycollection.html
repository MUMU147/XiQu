<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body{
            background-color: antiquewhite;
        }
        .mycoll{
            margin: 10px auto;
            width: 1200px;
            /*border: 1px solid red;*/
            /*overflow: auto;*/
        }
        .mycoll li{
            width: 260px;
            height: 300px;
            border: 1px solid #cccccc;
            background-color: white;
            list-style-type: none;
            text-align: center;
            float: left;
            margin-left: 20px;
        }
        .mycoll li img{
            width: 100%;
            height: 220px;
        }
        .mycoll li span{
            color: orange;
        }
        .mycoll li a{
            text-decoration: none;
            display: block;
            width: 100px;
            margin: 10px auto;
            height: 30px;
            line-height: 30px;
            color: white;
            background-color: #813333;
        }
    </style>
</head>
<body>
<form th:action="@{/batchCancle}" method="post">
    <ul class="mycoll">
      <li th:each="product:${productx}" >
        <img th:src="${product.img}" alt="">
        名称：<span th:text="${product.pname}">名称</span>
        单价：<span th:text="${product.price}">单价</span>
          <a th:href="@{/delcollection(pid=${product.pid})}">取消收藏</a>
          <input type="checkbox" th:value="${product.pid}" name="ids">
      </li>
    </ul>
    <p style="clear: both"></p>
    <input type="submit" value="批量取消">
</form>
</body>
</html>
