<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        a {
            text-align: center;
            text-decoration: none;
        }
        .left {
            float: left;
        }
        .right {
            float: right;
        }
        body{
            background-color: antiquewhite;
        }
        .mycoll{
            margin: 10px auto;
            width: 1200px;
            /*border: 1px solid red;*/
            /*overflow: auto;*/
        }
        .mycoll li{
            width: 270px;
            height: 400px;
            border: 1px solid #cccccc;
            background-color: white;
            list-style-type: none;
            text-align: center;
            float: left;
            margin-left: 20px;
        }
        .mycoll li img{
            width: 100%;
            height: 320px;
        }
        .mycoll li span{
            color: orange;
        }
        .mycoll li a{
            text-decoration: none;
            display: block;
            width: 100px;
            margin: 10px auto;
            height: 30px;
            line-height: 30px;
            color: white;
            background-color: #813333;
        }
         .shortcut {
            background-color: rgb(91, 31, 22);
            padding: 0 20px 0 100px;
            height: 60px;
            line-height: 60px;
        }

         .shortcut a,
         .shortcut h5 {
            float: left;
            display: block;
            font-size: 18px;
            height: 60px;
            line-height: 60px;
            margin-left: 10px;
            color: rgb(226, 219, 218);
        }
         .shortcut img {
            margin: 10px 70px 10px 10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        form>input{
            width: 125px;
            height:50px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<div class="shortcut">
    <a th:href="@{/findex}"><h5 class="left" style="margin: 0">中国戏曲网站</h5></a>
    <a th:href="@{/sindex}"><h5 class="left" style="margin: 0">回到商城</h5></a>
    <div class="right">
        <a th:href="@{/fapiao}">账户</a>
        <a th:href="@{/usere}"> <img src="view/foreground/images/dan.jpg" alt=""></a>
        <a th:href="@{/forget}">退出登录</a>
    </div>
</div>
<form th:action="@{/batchCancle}" method="post">
    <ul class="mycoll">
      <li th:each="product:${productx}">
        <img th:src="${product.img}" alt="">
        名称：<span th:text="${product.pname}">名称</span>
        单价：<span th:text="${product.price}">单价</span>
          <a th:href="@{/delcollection(pid=${product.pid})}" style="display: inline-block">取消收藏</a>
          <input type="checkbox" th:value="${product.pid}" name="ids">
      </li>
    </ul>
    <p style="clear: both"></p>
    <input type="submit" value="批量取消">
</form>
</body>
</html>
